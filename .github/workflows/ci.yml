name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # The guard that matters most.
  #
  # On 2026-07-13 this theme took down a shared production server because a block
  # render callback rendered the post content — which re-rendered every block in
  # that content, including itself, forever. See
  # docs/INCIDENT-2026-07-13-vps-outage.md.
  #
  # This job fails the build if that construct ever comes back. It is first, it
  # is fast, and it is not negotiable.
  # ---------------------------------------------------------------------------
  no-recursion:
    name: No content rendering in render callbacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      # This guard used to be two greps. Both were wrong in the same way: grep -n
      # prefixes each hit with "file:line:", so the follow-up `grep -vE '^\s*\*'`
      # meant to drop comment lines never matched anything, because the "*" was no
      # longer at the start of the line. The result was a build that failed on
      # every single run — flagging, of all things, the comment that warns people
      # not to call apply_filters( 'the_content' ). A red build that is always red
      # protects nothing; people stop reading it.
      #
      # The guard now tokenizes the PHP. A mention in a comment or a string is a
      # T_COMMENT / T_CONSTANT_ENCAPSED_STRING and is ignored; a genuine call is
      # caught even when split across lines. It is unit-tested against both.
      - name: No call renders post content
        run: php scripts/guard-no-content-render.php

      - name: The guard itself still catches the outage bug
        run: ./scripts/guard-selftest.sh

  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.3', '8.5' ]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer

      - name: PHP syntax
        run: find shadow-software-digest-theme-for-wordpress -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: JSON syntax
        run: |
          for f in $(find shadow-software-digest-theme-for-wordpress -name '*.json'); do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" || { echo "bad JSON: $f"; exit 1; }
          done

      - name: JavaScript syntax
        run: node --check shadow-software-digest-theme-for-wordpress/assets/js/blocks.js

  phpcs:
    name: WordPress Coding Standards + Theme Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer, cs2pr

      - name: Install standards
        run: |
          # NOTE: wptrt/wpthemereview:^0.2 used to be in this list and made the
          # whole command UNRESOLVABLE — it requires wp-coding-standards/wpcs ^2,
          # which conflicts with the ^3 pinned above. composer failed, the step
          # failed, and this job had never once actually run a sniff. WPThemeReview
          # is unmaintained; its sniffs live in WPCS 3's WordPress-Extra now.
          composer global config --no-plugins \
            allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev \
            wp-coding-standards/wpcs:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            dealerdirect/phpcodesniffer-composer-installer:^1 \
            --no-interaction
          echo "$(composer -n config --global home)/vendor/bin" >> "$GITHUB_PATH"

      - name: Run phpcs
        run: phpcs -q --report=checkstyle | cs2pr

  theme-check:
    name: Theme Directory requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # package.sh --check runs the PHP content-render guard over the staged
      # package, so this job needs a PHP binary even though it lints no PHP.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Required files exist
        run: |
          fail=0
          for f in shadow-software-digest-theme-for-wordpress/style.css shadow-software-digest-theme-for-wordpress/index.php shadow-software-digest-theme-for-wordpress/readme.txt \
                   shadow-software-digest-theme-for-wordpress/screenshot.png shadow-software-digest-theme-for-wordpress/LICENSE shadow-software-digest-theme-for-wordpress/theme.json; do
            [ -f "$f" ] || { echo "::error::missing required file: $f"; fail=1; }
          done
          exit $fail

      - name: Screenshot is exactly 1200x900
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq file
          dims=$(file shadow-software-digest-theme-for-wordpress/screenshot.png | grep -oE '[0-9]+ x [0-9]+' | head -1)
          echo "screenshot: $dims"
          [ "$dims" = "1200 x 900" ] || { echo "::error::screenshot.png must be 1200x900, got $dims"; exit 1; }

      - name: Version is in lockstep across style.css, functions.php and readme.txt
        run: |
          v_style=$(grep -oP '^Version:\s*\K[0-9.]+' shadow-software-digest-theme-for-wordpress/style.css)
          v_func=$(grep -oP "DIGEST_VERSION', '\K[0-9.]+" shadow-software-digest-theme-for-wordpress/functions.php)
          v_readme=$(grep -oP '^Stable tag:\s*\K[0-9.]+' shadow-software-digest-theme-for-wordpress/readme.txt)
          echo "style.css=$v_style functions.php=$v_func readme.txt=$v_readme"
          if [ "$v_style" != "$v_func" ] || [ "$v_style" != "$v_readme" ]; then
            echo "::error::version mismatch — these three must always agree, or asset caches never bust"
            exit 1
          fi

      - name: No bundled minified or third-party code
        run: |
          if find shadow-software-digest-theme-for-wordpress -name '*.min.js' -o -name '*.min.css' | grep -q .; then
            echo "::error::the Theme Directory requires unminified source"
            exit 1
          fi
          echo "OK."

      # Verify the bytes that would actually be UPLOADED, not the working tree
      # they are copied from. These are the checks the Theme Review team runs.
      # It caught .distignore and .stylelintrc.json shipping inside every
      # hand-made zip: they live in the theme directory, but .distignore's rules
      # are anchored to the repo root, so they could never match themselves.
      - name: The submission package is shippable
        run: ./scripts/package.sh --check

  # ---------------------------------------------------------------------------
  # The test that would have prevented the outage: actually run the theme, on a
  # real WordPress, and assert the pages are CORRECT — not merely alive.
  #
  # A liveness check is not enough. The re-entrancy guard makes a recursion render
  # fast-but-wrong instead of hanging, so a smoke test would pass on broken code.
  # This job asserts what the pages must CONTAIN.
  # ---------------------------------------------------------------------------
  render:
    name: Render the theme and assert correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite, mysqli, gd, zip
          coverage: none
          tools: wp-cli

      - name: Build the sandbox and start it
        run: |
          ./scripts/local-wp.sh up

      - name: Smoke — every template renders, fast, no fatals
        run: ./scripts/local-smoke.sh

      - name: Assert — the pages are correct
        run: php scripts/local-assert.php

      - name: Show the log on failure
        if: failure()
        run: tail -100 .local-wp.log || true
